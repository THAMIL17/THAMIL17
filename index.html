<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murugan's Spear Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.55.2/phaser.min.js"></script>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
        }
        #game {
            margin: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        function preload() {
            this.load.image('player', 'path/to/player.png');
            this.load.image('spear', 'path/to/spear.png');
        }

        function create() {
            this.player = this.physics.add.sprite(400, 300, 'player');
            this.spear = this.physics.add.sprite(400, 500, 'spear');
            // Other game mechanics initialization
        }

        function update() {
            // Game mechanics implementation
        }
    </script>
</body>
</html>
